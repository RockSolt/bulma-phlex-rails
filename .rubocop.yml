plugins:
  - rubocop-minitest

AllCops:
  NewCops: enable
  SuggestExtensions:
    rubocop-rake: false
  TargetRubyVersion: 3.2
  Exclude:
    - "gemfiles/**/*"

Lint/MissingSuper:
  Exclude:
    - lib/bulma_phlex/rails/components/**/*.rb

Metrics/ClassLength:
  Exclude:
    - test/**/*_test.rb

Metrics/MethodLength:
  Exclude:
    - test/**/*_test.rb

Minitest/UselessAssertion:
  Exclude:
    - test/tag_output_assertions.rb

Naming/FileName:
  Exclude:
    - lib/bulma-phlex-rails.rb

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes
